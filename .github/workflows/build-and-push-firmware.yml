name: Build and push firmware

on:
  workflow_call:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      image: ghcr.io/${{ github.repository_owner }}/grid-firmware:latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Prepare image
        uses: ./.github/actions/prepare-image
        with:
          image-name: "grid-firmware"
          dockerfile: "Dockerfile"

      - name: Build ESP32 firmware
        run: |
          docker run -v $PWD:/project -w /project ${{ env.image }} \
          sh -c "./lua_build.sh && ./pico_build.sh"

