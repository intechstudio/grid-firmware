name: Build and push firmware

on:
  push:
    paths-ignore:
      - 'Dockerfile'
  workflow_dispatch:
  workflow_run:
    workflows: [Build and push Docker image]
    types:
      - completed

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Build ESP32 firmware
        run: |
          docker run -v $PWD:/project -w /project/ \
          ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
          sh -c "./lua_build.sh && ./pico_build.sh"

