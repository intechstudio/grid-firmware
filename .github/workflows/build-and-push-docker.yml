name: Build and push Docker image

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile
        required: true
        type: string
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      image: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
      label: org.opencontainers.image.revision
    steps:

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check image revision
        run:
          IMAGE_SHA=$( \
            docker manifest inspect ${{ env.image }} \
            --format '{{ index .Config.Labels "${{ env.label }}" }}'
          )
          echo "IMAGE_SHA"
          echo $IMAGE_SHA

      - name: Build image
        run: docker build --label ${{ env.label }}=${{ github.sha }} -t ${{ env.image }} .

      - name: Push image
        run: docker push ${{ env.image }}
