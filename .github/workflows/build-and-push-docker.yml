name: Build and push Docker image

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile
        required: true
        type: string
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set environment variables
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "DOCKERFILE=${{ inputs.dockerfile }}" >> "$GITHUB_ENV"

      - name: Use environment variables
        run: |
          echo $IMAGE

      - name: Build image
        run: docker build \
          --label org.opencontainers.image.revision=${{ github.sha }} \
          -t ghcr.io/${{ github.repository_owner }}/grid-firmware:${{ github.ref_name }} .

      - name: Push image
        run: docker push ghcr.io/${{ github.repository_owner }}/grid-firmware:${{ github.ref_name }}
