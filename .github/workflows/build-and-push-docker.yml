name: Build and push docker image

on:
  push:
    paths:
      - 'Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      packages: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
