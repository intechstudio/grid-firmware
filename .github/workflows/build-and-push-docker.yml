name: Build and push docker image

on:
  push:
    paths:
      - 'Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

      - name: Set environment variables
        run: echo "IMAGE_TAG=$(basename ${{ github.ref }})" >> $GITHUB_ENV
        TAG: ${{ github.ref }}

      - name: Use environment variables
        run: echo "$IMAGE_TAG"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/grid-firmware:$IMAGE_TAG .

      - name: Push image
        run: docker push ghcr.io/${{ github.repository_owner }}/grid-firmware:$IMAGE_TAG
